<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Arena</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="app">
  <div class="container" id="screen-menu">
    <h1>Snake Arena</h1>
    <p class="subtitle">Jogo da Cobrinha 1v1 - quem cresce mais vence</p>

    <div class="panel" id="menu">
      <button id="btn-create" class="btn btn-primary">Criar Sala</button>
      <div class="separator">ou</div>
      <div class="join-row">
        <input id="input-code" type="text" maxlength="4" placeholder="Codigo" autocomplete="off">
        <button id="btn-join" class="btn btn-secondary">Entrar</button>
      </div>
    </div>

    <div class="error hidden" id="error-msg"></div>
  </div>

  <div class="game-container hidden" id="screen-game">
    <div class="hud">
      <div id="game-info">Conectando...</div>
      <div id="room-code-display">Sala: <span id="room-code">---</span></div>
      <button id="btn-ready" class="btn btn-primary hidden">Estou Pronto</button>
    </div>

    <canvas id="game-canvas" width="800" height="600"></canvas>

    <div class="touch-controls">
      <div class="dpad">
        <button class="touch-dir" data-dir="up">&#9650;</button>
        <button class="touch-dir" data-dir="left">&#9664;</button>
        <button class="touch-dir" data-dir="down">&#9660;</button>
        <button class="touch-dir" data-dir="right">&#9654;</button>
      </div>
    </div>
  </div>

  <div class="container hidden" id="screen-result">
    <h2 id="result-text"></h2>
    <button id="btn-play-again" class="btn btn-primary">Jogar Novamente</button>
    <button id="btn-back-menu" class="btn btn-ghost">Voltar ao menu</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/game.js"></script>
</body>
</html>
